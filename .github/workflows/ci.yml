# CI for this repository: unit tests and static analysis for the helper
# scripts, composite actions, and workflows.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ruff (Python)
        run: pipx run ruff check scripts tests
      - name: ShellCheck (shell scripts)
        run: shellcheck scripts/*.sh
      - name: actionlint (workflows)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash /tmp/download-actionlint.bash latest /tmp
          /tmp/actionlint -color
