# Reusable workflow: implement an approved issue with the Crafter.
#
# Call from a consumer repository on `issues: [labeled]` and
# `pull_request: [labeled]`. Acts when the added label is the trigger
# label (default `flow`) and the issue is buildable: `flow/awaiting-approval` with the
# "ready for implementation" checkbox ticked (first run), or
# `flow/blocked-build` / `flow/pr-open` (retry and rework runs).
#
# Two equivalent trigger surfaces:
#   - the trigger label on the issue itself, or
#   - the trigger label on the issue's `flow/issue-<n>` pull request (the
#     rework shortcut: leave review feedback on the PR, then label the PR).
#
# The Crafter edits the working tree only; this workflow commits, pushes,
# and opens or updates the pull request. Merging is always a human action.
name: issue-driven-flow / build

on:
  workflow_call:
    inputs:
      agent:
        description: >-
          Coding agent to run: claude, codex, or gemini. Empty = auto-detect
          from the provided secrets, preferring claude, then codex, then
          gemini.
        type: string
        required: false
        default: ""
      model:
        description: >-
          Model id override for the selected agent (empty = that agent's
          default). Must match the agent that will run.
        type: string
        required: false
        default: ""
      max_turns:
        description: >-
          Upper bound on Crafter agent turns; the run fails (and the issue
          lands in flow/blocked-build) when exceeded. Enforced for claude
          and gemini; codex runs are bounded by the job timeout only.
        type: number
        required: false
        default: 150
      trigger_label:
        description: >-
          Name of the public trigger label. Must not start with "flow/"
          (the state-label namespace) and must match the label the wrapper
          filters on.
        type: string
        required: false
        default: "flow"
      web_research:
        description: >-
          Give the agent web research tools (search/fetch) so it can check
          external facts instead of blocking on them. Set false to keep
          agent runs offline apart from the model API.
        type: boolean
        required: false
        default: true
    secrets:
      anthropic_api_key:
        description: Anthropic API key; enables the claude agent (or provide claude_code_oauth_token)
        required: false
      claude_code_oauth_token:
        description: Claude Code OAuth token; enables the claude agent (or provide anthropic_api_key)
        required: false
      openai_api_key:
        description: OpenAI API key; enables the codex agent
        required: false
      gemini_api_key:
        description: Gemini API key; enables the gemini agent
        required: false
      bot_token:
        description: >-
          Optional PAT or GitHub App token used for pushing and PR creation.
          Without it the default GITHUB_TOKEN is used and the consumer
          repository's CI workflows will NOT trigger on Crafter PRs.
        required: false

jobs:
  route:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == inputs.trigger_label &&
      (github.event_name == 'issues' ||
       (github.event_name == 'pull_request' &&
        startsWith(github.event.pull_request.head.ref, 'flow/issue-')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      state: ${{ steps.route.outputs.state }}
      note: ${{ steps.route.outputs.note }}
      first-run: ${{ steps.route.outputs.first-run }}
      issue-number: ${{ steps.issue.outputs.number }}
      trigger: ${{ steps.issue.outputs.trigger }}
    steps:
      - name: Identify issue and trigger surface
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE: ${{ github.event.issue.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "issues" ]; then
            number="$EVENT_ISSUE"
            trigger="issue"
          else
            number="${HEAD_REF#flow/issue-}"
            trigger="pr"
            if ! [[ "$number" =~ ^[0-9]+$ ]]; then
              number=""
            fi
          fi
          {
            echo "number=${number}"
            echo "trigger=${trigger}"
          } >> "$GITHUB_OUTPUT"

      - name: Route by current state
        id: route
        if: steps.issue.outputs.number != ''
        uses: 4moda/issue-driven-flow/actions/route@v2
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          workflow: build
          trigger: ${{ steps.issue.outputs.trigger }}
          trigger-label: ${{ inputs.trigger_label }}

  # PR-labeled triggers never reach shape.yml, so build.yml answers the
  # ones it cannot act on itself: comment on the PR and clear the trigger.
  acknowledge:
    needs: route
    if: needs.route.outputs.action == 'acknowledge'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Comment on PR and clear trigger
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          NOTE: ${{ needs.route.outputs.note }}
          TRIGGER_LABEL: ${{ inputs.trigger_label }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/${REPO}/issues/${PR}/comments" \
            -f body="**issue-driven-flow** — no step to run. ${NOTE}" >/dev/null
          encoded="$(jq -rn --arg l "$TRIGGER_LABEL" '$l | @uri')"
          gh api -X DELETE "repos/${REPO}/issues/${PR}/labels/${encoded}" \
            >/dev/null 2>&1 || true

  build:
    needs: route
    if: needs.route.outputs.action == 'build'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # job-level on purpose: workflow-level concurrency is unreliable in
    # called reusable workflows. Shared group with shape.yml serializes all
    # agent runs per issue, whichever surface triggered them.
    concurrency:
      group: issue-driven-flow-issue-${{ needs.route.outputs.issue-number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      ISSUE: ${{ needs.route.outputs.issue-number }}
      REPO: ${{ github.repository }}
      TRIGGER_LABEL: ${{ inputs.trigger_label }}
      BRANCH: flow/issue-${{ needs.route.outputs.issue-number }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      GH_SERVER: ${{ github.server_url }}
    steps:
      - name: Set run directories
        run: |
          {
            echo "CONTEXT_DIR=${RUNNER_TEMP}/gf-context"
            echo "OUT_DIR=${RUNNER_TEMP}/gf-out"
          } >> "$GITHUB_ENV"

      # `uses:` cannot be chosen dynamically, so the selected agent gates
      # one of three mutually exclusive Run Crafter steps below.
      - name: Select agent
        id: agent
        env:
          AGENT: ${{ inputs.agent }}
          HAS_CLAUDE: ${{ (secrets.anthropic_api_key != '' || secrets.claude_code_oauth_token != '') && 'true' || 'false' }}
          HAS_CODEX: ${{ secrets.openai_api_key != '' && 'true' || 'false' }}
          HAS_GEMINI: ${{ secrets.gemini_api_key != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          agent=""
          case "$AGENT" in
            claude) if [ "$HAS_CLAUDE" = "true" ]; then agent=claude; fi ;;
            codex)  if [ "$HAS_CODEX" = "true" ];  then agent=codex;  fi ;;
            gemini) if [ "$HAS_GEMINI" = "true" ]; then agent=gemini; fi ;;
            "")
              if   [ "$HAS_CLAUDE" = "true" ]; then agent=claude
              elif [ "$HAS_CODEX" = "true" ];  then agent=codex
              elif [ "$HAS_GEMINI" = "true" ]; then agent=gemini
              fi
              ;;
            *)
              echo "::error::unknown agent '${AGENT}' (expected claude, codex, or gemini)"
              exit 1
              ;;
          esac
          if [ -z "$agent" ]; then
            echo "::error::no credential for the requested agent. Provide anthropic_api_key/claude_code_oauth_token (claude), openai_api_key (codex), or gemini_api_key (gemini)."
            exit 1
          fi
          echo "agent=${agent}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.bot_token || github.token }}
          # the Crafter must not be able to push or read a token from
          # .git/config; the publish step re-authenticates explicitly
          persist-credentials: false

      - name: Mark issue as building
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/building
          remove-trigger: "true"
          trigger-label: ${{ inputs.trigger_label }}

      - name: Clear trigger from PR
        if: needs.route.outputs.trigger == 'pr'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          encoded="$(jq -rn --arg l "$TRIGGER_LABEL" '$l | @uri')"
          gh api -X DELETE "repos/${REPO}/issues/${PR}/labels/${encoded}" \
            >/dev/null 2>&1 || true

      - name: Prepare working branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # fetch-depth 0 brought every branch, so the remote-tracking ref
          # answers "does the branch exist" without credentials
          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Build context
        uses: 4moda/issue-driven-flow/actions/build-context@v2
        with:
          issue-number: ${{ env.ISSUE }}
          context-dir: ${{ env.CONTEXT_DIR }}

      - name: Prepare output directory
        run: mkdir -p "$OUT_DIR"

      # one prompt for every agent: the contract file shipped into
      # CONTEXT_DIR/contracts by build-context is the single source of truth
      - name: Compose prompt
        run: |
          {
            echo 'AGENT_PROMPT<<GF_PROMPT_EOF'
            echo "You are the issue-driven-flow Crafter, implementing issue #${ISSUE} of ${REPO}."
            echo
            echo "Read ${CONTEXT_DIR}/contracts/crafter.md and follow that contract exactly."
            echo "The context files for this run are in ${CONTEXT_DIR}."
            echo "The repository is checked out in the working directory on branch ${BRANCH}; edit it directly."
            echo "Write your run outputs into ${OUT_DIR}."
            echo 'GF_PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - name: Run Crafter (Claude Code)
        if: steps.agent.outputs.agent == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ github.token }}
          prompt: ${{ env.AGENT_PROMPT }}
          # publishing belongs to the workflow: the contract already forbids
          # commit/push/gh, the deny rules make it fail fast instead
          claude_args: >-
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep${{ inputs.web_research && ',WebSearch,WebFetch' || '' }}"
            --disallowedTools "Bash(git commit:*),Bash(git push:*),Bash(gh:*)"
            --max-turns ${{ inputs.max_turns }}
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}

      - name: Run Crafter (Codex)
        if: steps.agent.outputs.agent == 'codex'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.openai_api_key }}
          prompt: ${{ env.AGENT_PROMPT }}
          model: ${{ inputs.model }}
          # the extra writable root is where CONTEXT_DIR/OUT_DIR live;
          # network stays on so the Crafter can install deps and run tests
          sandbox: workspace-write
          codex-args: >-
            ["-c", "sandbox_workspace_write.writable_roots=[\"${{ runner.temp }}\"]",
             "-c", "sandbox_workspace_write.network_access=true",
             "-c", "web_search=\"${{ inputs.web_research && 'live' || 'disabled' }}\""]
          # the labeled-event gate (trigger label, triage+ actors) is this
          # workflow's access control; no per-user gate here
          allow-users: "*"

      - name: Run Crafter (Gemini CLI)
        if: steps.agent.outputs.agent == 'gemini'
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          # the agent needs no GitHub access; the workflow publishes results
          GITHUB_TOKEN: ""
        with:
          gemini_api_key: ${{ secrets.gemini_api_key }}
          gemini_model: ${{ inputs.model }}
          prompt: ${{ env.AGENT_PROMPT }}
          # tools.core is an allowlist: file tools plus shell for tests and,
          # when enabled, web research; no MCP. Both grep tool names are
          # listed to cover CLI versions before/after the rename.
          settings: |-
            {
              "model": { "maxSessionTurns": ${{ inputs.max_turns }} },
              "context": { "includeDirectories": ["${{ env.CONTEXT_DIR }}", "${{ env.OUT_DIR }}"] },
              "tools": { "core": ["read_file", "read_many_files", "list_directory", "glob", "grep_search", "search_file_content", "write_file", "replace", "run_shell_command"${{ inputs.web_research && ', "web_fetch", "google_web_search"' || '' }}] },
              "telemetry": { "enabled": false }
            }

      - name: Read Crafter result
        id: result
        run: |
          set -euo pipefail
          outcome=failed
          note='The Crafter run did not produce a valid result.json.'
          title=""
          : > "$OUT_DIR/summary.md"
          if [ -f "$OUT_DIR/result.json" ] && jq -e . "$OUT_DIR/result.json" >/dev/null 2>&1; then
            outcome="$(jq -r '.outcome // "failed"' "$OUT_DIR/result.json")"
            note="$(jq -r '.note // ""' "$OUT_DIR/result.json")"
            title="$(jq -r '.pr_title // ""' "$OUT_DIR/result.json" | head -n 1)"
            jq -r '.summary // ""' "$OUT_DIR/result.json" > "$OUT_DIR/summary.md"
          fi
          case "$outcome" in ready|blocked) ;; *) outcome=failed ;; esac
          if [ "$outcome" = "ready" ] && [ ! -s "$OUT_DIR/summary.md" ]; then
            echo "(no summary provided)" > "$OUT_DIR/summary.md"
          fi
          if [ -z "$title" ]; then
            title="Resolve #${ISSUE}: $(jq -r '.title // ""' "$CONTEXT_DIR/issue.json" | head -n 1)"
          fi
          {
            echo '**issue-driven-flow** — Crafter is blocked on missing input.'
            echo
            echo "$note"
            echo
            echo "Update the issue (or answer in a comment) with the missing information, then add the \`${TRIGGER_LABEL}\` label to retry."
          } > "$OUT_DIR/blocked-comment.md"
          {
            echo '**issue-driven-flow** — the build run failed.'
            echo
            echo "$note"
            echo
            echo "See the [run log](${RUN_URL}). Fix the cause if needed, then add the \`${TRIGGER_LABEL}\` label to retry."
          } > "$OUT_DIR/failed-comment.md"
          {
            echo "outcome=${outcome}"
            echo "title=${title}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish branch and PR
        id: publish
        if: steps.result.outputs.outcome == 'ready'
        env:
          GH_TOKEN: ${{ secrets.bot_token || github.token }}
          TITLE: ${{ steps.result.outputs.title }}
        run: |
          set -euo pipefail
          # checkout ran with persist-credentials: false so the Crafter had
          # no push credential; authenticate only now that it is done
          server="${GH_SERVER#https://}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@${server}/${REPO}.git"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "${TITLE}" -m "issue-driven-flow Crafter run for #${ISSUE}"
          fi

          # push only when the local branch is ahead of its remote
          pushed_new=false
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            if [ "$(git rev-list --count "origin/${BRANCH}..HEAD")" -gt 0 ]; then
              git push -u origin "$BRANCH"
              pushed_new=true
            fi
          elif [ "$(git rev-list --count "origin/${DEFAULT_BRANCH}..HEAD")" -gt 0 ]; then
            git push -u origin "$BRANCH"
            pushed_new=true
          fi

          # a PR is warranted whenever the branch differs from the default
          # branch — even with no new push this run (e.g. a retry after PR
          # creation failed, with the changes already on the remote branch)
          if [ "$(git rev-list --count "origin/${DEFAULT_BRANCH}..HEAD")" -eq 0 ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          owner="${REPO%%/*}"
          pr="$(gh api "repos/${REPO}/pulls?state=open&head=${owner}:${BRANCH}" \
            --jq '.[0].number // empty')"
          if [ -z "$pr" ]; then
            {
              cat "$OUT_DIR/summary.md"
              echo
              echo '---'
              echo "Closes #${ISSUE}"
              echo
              echo '_Opened by the issue-driven-flow Crafter. Merge is always a human decision._'
            } > "$OUT_DIR/pr-body.md"
            pr_url="$(gh pr create --repo "$REPO" --head "$BRANCH" \
              --base "$DEFAULT_BRANCH" --title "$TITLE" \
              --body-file "$OUT_DIR/pr-body.md")"
            pr="${pr_url##*/}"
          elif [ "$pushed_new" = "true" ]; then
            {
              echo '**issue-driven-flow** — Crafter pushed an update to this PR.'
              echo
              cat "$OUT_DIR/summary.md"
            } > "$OUT_DIR/pr-comment.md"
            gh api -X POST "repos/${REPO}/issues/${pr}/comments" \
              -F body=@"$OUT_DIR/pr-comment.md" >/dev/null
          fi
          {
            echo "**issue-driven-flow** — Crafter finished. PR [#${pr}](${GH_SERVER}/${REPO}/pull/${pr}) is ready for review."
            echo
            echo "Review and merge manually when satisfied. To request changes: leave a PR review requesting changes (or describe them in an issue comment), then add the \`${TRIGGER_LABEL}\` label to this issue."
          } > "$OUT_DIR/issue-comment.md"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Update issue — PR open
        if: steps.result.outputs.outcome == 'ready' && steps.publish.outputs.pushed == 'true'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/pr-open
          comment-file: ${{ env.OUT_DIR }}/issue-comment.md

      - name: Update issue — no changes produced
        if: steps.result.outputs.outcome == 'ready' && steps.publish.outputs.pushed == 'false'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/blocked-build
          comment: >-
            **issue-driven-flow** — the Crafter reported success but produced no
            changes, so nothing was pushed. Refine the issue (the acceptance
            criteria may already be satisfied), then add the
            `${{ inputs.trigger_label }}` label to retry, or close the issue
            if no work is needed.

      - name: Update issue — blocked
        if: steps.result.outputs.outcome == 'blocked'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/blocked-build
          comment-file: ${{ env.OUT_DIR }}/blocked-comment.md

      - name: Update issue — failed
        if: steps.result.outputs.outcome == 'failed'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/blocked-build
          comment-file: ${{ env.OUT_DIR }}/failed-comment.md

      - name: Recover from unexpected failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "flow/blocked-build" --repo "$REPO" --color b60205 \
            --description "issue-driven-flow: implementation blocked, needs human input (automation-managed)" \
            >/dev/null 2>&1 || true
          # clear whatever state the run started from, so at most one
          # flow/* label remains after recovery
          for label in flow%2Fbuilding flow%2Fawaiting-approval flow%2Fpr-open; do
            gh api -X DELETE "repos/${REPO}/issues/${ISSUE}/labels/${label}" \
              >/dev/null 2>&1 || true
          done
          gh api -X POST "repos/${REPO}/issues/${ISSUE}/labels" \
            -f "labels[]=flow/blocked-build" >/dev/null 2>&1 || true
          gh api -X POST "repos/${REPO}/issues/${ISSUE}/comments" \
            -f body="**issue-driven-flow** — the build run failed unexpectedly. See the [run log](${RUN_URL}), then add the \`${TRIGGER_LABEL}\` label to retry." \
            >/dev/null 2>&1 || true
          encoded="$(jq -rn --arg l "$TRIGGER_LABEL" '$l | @uri')"
          gh api -X DELETE "repos/${REPO}/issues/${ISSUE}/labels/${encoded}" \
            >/dev/null 2>&1 || true
