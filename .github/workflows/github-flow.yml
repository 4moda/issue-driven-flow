# Dogfood wrapper: run issue-driven-flow on this repository itself.
#
# Other repositories should reference the reusable workflows by tag
# (uses: 4moda/issue-driven-flow/.github/workflows/shape.yml@v2 — see
# docs/adopting.md). This repo uses the local `./` form instead, so main
# always exercises the latest workflow logic. Note the composite actions
# inside those workflows still resolve at @v2, so action changes take
# effect here only after the v2 tag moves.
name: issue-driven-flow

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled, closed, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  # the label name below must match the workflows' trigger_label input
  # (default "flow")
  shape:
    if: github.event_name == 'issues' && github.event.label.name == 'flow'
    uses: ./.github/workflows/shape.yml
    permissions:
      contents: read
      issues: write
    with:
      # model must match the auto-selected agent; this repo provides Claude
      # credentials only, so claude always wins the auto-detection
      model: claude-sonnet-5
      max_turns: 50
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

  build:
    # fires for `flow` on an issue AND on a flow/issue-N pull request
    if: github.event.label.name == 'flow'
    uses: ./.github/workflows/build.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      model: claude-sonnet-5
      max_turns: 150
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      bot_token: ${{ secrets.GF_BOT_TOKEN }}

  sync-pr:
    if: >-
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'pull_request' && github.event.action != 'labeled')
    uses: ./.github/workflows/sync-pr.yml
    permissions:
      issues: write
      pull-requests: read
