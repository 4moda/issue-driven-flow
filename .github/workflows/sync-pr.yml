# Reusable workflow: reflect PR outcomes back onto the linked issue, and
# close a flow/split parent once every one of its sub-issues has closed.
#
# Call from a consumer repository on:
#   pull_request:        types: [closed, reopened]
#   pull_request_review: types: [submitted]
#   issues:               types: [closed]
#
# Only PRs on issue-driven-flow working branches (flow/issue-<n>) are handled; the
# issue number is derived from the branch name. Split-parent resolution
# looks at whichever issue just closed, regardless of branch.
name: issue-driven-flow / sync-pr

on:
  workflow_call:
    inputs:
      trigger_label:
        description: >-
          Name of the public trigger label; interpolated into guidance
          comments and removed on terminal transitions.
        type: string
        required: false
        default: "flow"

jobs:
  sync:
    if: >-
      startsWith(github.event.pull_request.head.ref, 'flow/issue-') &&
      ((github.event_name == 'pull_request' &&
        (github.event.action == 'closed' || github.event.action == 'reopened')) ||
       (github.event_name == 'pull_request_review' &&
        github.event.action == 'submitted'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # job-level on purpose: workflow-level concurrency is unreliable in
    # called reusable workflows
    concurrency:
      group: issue-driven-flow-sync-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Derive issue number from branch
        id: issue
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          number="${HEAD_REF#flow/issue-}"
          if [[ "$number" =~ ^[0-9]+$ ]]; then
            echo "number=${number}" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

      - name: PR merged — mark issue done
        if: >-
          steps.issue.outputs.number != '' &&
          github.event_name == 'pull_request' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          state: flow/done
          remove-trigger: "true"
          trigger-label: ${{ inputs.trigger_label }}
          comment: >-
            **issue-driven-flow** — PR #${{ github.event.pull_request.number }}
            was merged. Flow complete.

      - name: PR closed without merge — mark issue blocked
        if: >-
          steps.issue.outputs.number != '' &&
          github.event_name == 'pull_request' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == false
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          state: flow/blocked-build
          remove-trigger: "true"
          trigger-label: ${{ inputs.trigger_label }}
          comment: >-
            **issue-driven-flow** — PR #${{ github.event.pull_request.number }}
            was closed without merging. Update the issue with what should
            happen instead and add the `${{ inputs.trigger_label }}` label
            to rebuild, or close this issue if the work is no longer needed.

      - name: PR reopened — mark issue pr-open
        if: >-
          steps.issue.outputs.number != '' &&
          github.event_name == 'pull_request' &&
          github.event.action == 'reopened'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          state: flow/pr-open
          comment: >-
            **issue-driven-flow** — PR #${{ github.event.pull_request.number }}
            was reopened.

      - name: Changes requested — prompt rework
        if: >-
          steps.issue.outputs.number != '' &&
          github.event_name == 'pull_request_review' &&
          github.event.review.state == 'changes_requested'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ steps.issue.outputs.number }}
          comment: >-
            **issue-driven-flow** — a review on PR
            #${{ github.event.pull_request.number }} requested changes. Add
            the `${{ inputs.trigger_label }}` label to the PR (or to this
            issue) to have the Crafter address the review feedback.

  # Purely mechanical, no AI: fires whenever any issue closes. Most closes
  # have no flow/split parent (split-status resolves that to "none") and
  # are a no-op; when the closed issue is the last open sub-issue of a
  # flow/split parent, the parent is closed and marked flow/done.
  split-complete:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: issue-driven-flow-split-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      issues: write
    steps:
      - name: Resolve split parent and completeness
        id: split
        uses: 4moda/issue-driven-flow/actions/split-status@v2
        with:
          issue-number: ${{ github.event.issue.number }}

      - name: Every sub-issue closed — close the split parent
        if: >-
          steps.split.outputs.parent-number != '' &&
          steps.split.outputs.complete == 'true'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ steps.split.outputs.parent-number }}
          state: flow/done
          close: "true"
          comment: >-
            **issue-driven-flow** — every sub-issue of this split has been
            closed. The split is complete.
