# Reusable workflow: shape an issue with the Composer.
#
# Call from a consumer repository on `issues: [labeled]`. Acts when the
# added label is the trigger label (default `flow`) and the issue is shapeable (no flow/* state label,
# `flow/blocked-shape`, or `flow/awaiting-approval` with the ready checkbox
# still unchecked). Also acknowledges triggers that no workflow can act
# on, so the trigger label never sticks around silently.
name: issue-driven-flow / shape

on:
  workflow_call:
    inputs:
      agent:
        description: >-
          Coding agent to run: claude, codex, or gemini. Empty = auto-detect
          from the provided secrets, preferring claude, then codex, then
          gemini.
        type: string
        required: false
        default: ""
      model:
        description: >-
          Model id override for the selected agent (empty = that agent's
          default). Must match the agent that will run.
        type: string
        required: false
        default: ""
      max_turns:
        description: >-
          Upper bound on Composer agent turns; the run fails (and the issue
          lands in flow/blocked-shape) when exceeded. Enforced for claude
          and gemini; codex runs are bounded by the job timeout only.
        type: number
        required: false
        default: 50
      trigger_label:
        description: >-
          Name of the public trigger label. Must not start with "flow/"
          (the state-label namespace) and must match the label the wrapper
          filters on.
        type: string
        required: false
        default: "flow"
      web_research:
        description: >-
          Give the agent web research tools (search/fetch) so it can check
          external facts instead of blocking on them. Set false to keep
          agent runs offline apart from the model API.
        type: boolean
        required: false
        default: true

    secrets:
      anthropic_api_key:
        description: Anthropic API key; enables the claude agent (or provide claude_code_oauth_token)
        required: false
      claude_code_oauth_token:
        description: Claude Code OAuth token; enables the claude agent (or provide anthropic_api_key)
        required: false
      openai_api_key:
        description: OpenAI API key; enables the codex agent
        required: false
      gemini_api_key:
        description: Gemini API key; enables the gemini agent
        required: false

jobs:
  route:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == inputs.trigger_label
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      state: ${{ steps.route.outputs.state }}
      note: ${{ steps.route.outputs.note }}
    steps:
      - name: Route by current state
        id: route
        uses: 4moda/issue-driven-flow/actions/route@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          workflow: shape
          trigger-label: ${{ inputs.trigger_label }}

  # Answers `ai` triggers that neither shape nor build can act on.
  acknowledge:
    needs: route
    if: needs.route.outputs.action == 'acknowledge'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Comment and clear trigger
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          NOTE: ${{ needs.route.outputs.note }}
          TRIGGER_LABEL: ${{ inputs.trigger_label }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/${REPO}/issues/${ISSUE}/comments" \
            -f body="**issue-driven-flow** — no step to run. ${NOTE}" >/dev/null
          encoded="$(jq -rn --arg l "$TRIGGER_LABEL" '$l | @uri')"
          gh api -X DELETE "repos/${REPO}/issues/${ISSUE}/labels/${encoded}" \
            >/dev/null 2>&1 || true

  shape:
    needs: route
    if: needs.route.outputs.action == 'shape'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # job-level on purpose: workflow-level concurrency is unreliable in
    # called reusable workflows. Shared group with build.yml serializes all
    # agent runs per issue.
    concurrency:
      group: issue-driven-flow-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    env:
      ISSUE: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}
      TRIGGER_LABEL: ${{ inputs.trigger_label }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Set run directories
        run: |
          {
            echo "CONTEXT_DIR=${RUNNER_TEMP}/gf-context"
            echo "OUT_DIR=${RUNNER_TEMP}/gf-out"
          } >> "$GITHUB_ENV"

      # `uses:` cannot be chosen dynamically, so the selected agent gates
      # one of three mutually exclusive Run Composer steps below.
      - name: Select agent
        id: agent
        env:
          AGENT: ${{ inputs.agent }}
          HAS_CLAUDE: ${{ (secrets.anthropic_api_key != '' || secrets.claude_code_oauth_token != '') && 'true' || 'false' }}
          HAS_CODEX: ${{ secrets.openai_api_key != '' && 'true' || 'false' }}
          HAS_GEMINI: ${{ secrets.gemini_api_key != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          agent=""
          case "$AGENT" in
            claude) if [ "$HAS_CLAUDE" = "true" ]; then agent=claude; fi ;;
            codex)  if [ "$HAS_CODEX" = "true" ];  then agent=codex;  fi ;;
            gemini) if [ "$HAS_GEMINI" = "true" ]; then agent=gemini; fi ;;
            "")
              if   [ "$HAS_CLAUDE" = "true" ]; then agent=claude
              elif [ "$HAS_CODEX" = "true" ];  then agent=codex
              elif [ "$HAS_GEMINI" = "true" ]; then agent=gemini
              fi
              ;;
            *)
              echo "::error::unknown agent '${AGENT}' (expected claude, codex, or gemini)"
              exit 1
              ;;
          esac
          if [ -z "$agent" ]; then
            echo "::error::no credential for the requested agent. Provide anthropic_api_key/claude_code_oauth_token (claude), openai_api_key (codex), or gemini_api_key (gemini)."
            exit 1
          fi
          echo "agent=${agent}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # the Composer must not be able to push; nothing in this job
          # needs git credentials after checkout
          persist-credentials: false

      - name: Mark issue as shaping
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/shaping
          remove-trigger: "true"
          trigger-label: ${{ inputs.trigger_label }}

      - name: Build context
        uses: 4moda/issue-driven-flow/actions/build-context@v2
        with:
          issue-number: ${{ env.ISSUE }}
          context-dir: ${{ env.CONTEXT_DIR }}

      - name: Prepare output directory
        run: mkdir -p "$OUT_DIR"

      # one prompt for every agent: the contract file shipped into
      # CONTEXT_DIR/contracts by build-context is the single source of truth
      - name: Compose prompt
        run: |
          {
            echo 'AGENT_PROMPT<<GF_PROMPT_EOF'
            echo "You are the issue-driven-flow Composer, shaping issue #${ISSUE} of ${REPO}."
            echo
            echo "Read ${CONTEXT_DIR}/contracts/composer.md and follow that contract exactly."
            echo "The context files for this run are in ${CONTEXT_DIR}."
            echo "The target repository is checked out read-only in the working directory."
            echo "Write your outputs into ${OUT_DIR}."
            echo 'GF_PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - name: Run Composer (Claude Code)
        if: steps.agent.outputs.agent == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ github.token }}
          prompt: ${{ env.AGENT_PROMPT }}
          # Write is limited to the output directory (// = absolute path
          # rule), so the working tree stays read-only for real
          claude_args: >-
            --allowedTools "Read,Glob,Grep,${{ inputs.web_research && 'WebSearch,WebFetch,' || '' }}Write(/${{ runner.temp }}/gf-out/**)"
            --max-turns ${{ inputs.max_turns }}
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}

      - name: Run Composer (Codex)
        if: steps.agent.outputs.agent == 'codex'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.openai_api_key }}
          prompt: ${{ env.AGENT_PROMPT }}
          model: ${{ inputs.model }}
          # workspace-write keeps network off (web_search is an API-side
          # tool and needs none); the extra writable root is where
          # CONTEXT_DIR/OUT_DIR live. Shape never applies working-tree
          # edits, so a stray write there is discarded with the runner.
          sandbox: workspace-write
          codex-args: >-
            ["-c", "sandbox_workspace_write.writable_roots=[\"${{ runner.temp }}\"]",
             "-c", "web_search=\"${{ inputs.web_research && 'live' || 'disabled' }}\""]
          # the labeled-event gate (trigger label, triage+ actors) is this
          # workflow's access control; no per-user gate here
          allow-users: "*"

      - name: Run Composer (Gemini CLI)
        if: steps.agent.outputs.agent == 'gemini'
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          # the agent needs no GitHub access; the workflow applies results
          GITHUB_TOKEN: ""
        with:
          gemini_api_key: ${{ secrets.gemini_api_key }}
          gemini_model: ${{ inputs.model }}
          prompt: ${{ env.AGENT_PROMPT }}
          # tools.core is an allowlist: read-only exploration plus file
          # writes (for OUT_DIR) and, when enabled, web research; no shell.
          # Both grep tool names are listed to cover CLI versions
          # before/after the rename.
          settings: |-
            {
              "model": { "maxSessionTurns": ${{ inputs.max_turns }} },
              "context": { "includeDirectories": ["${{ env.CONTEXT_DIR }}", "${{ env.OUT_DIR }}"] },
              "tools": { "core": ["read_file", "read_many_files", "list_directory", "glob", "grep_search", "search_file_content", "write_file"${{ inputs.web_research && ', "web_fetch", "google_web_search"' || '' }}] },
              "telemetry": { "enabled": false }
            }

      - name: Read Composer result
        id: result
        run: |
          set -euo pipefail
          outcome=failed
          note='The Composer run did not produce a valid result.json.'
          if [ -f "$OUT_DIR/result.json" ] && jq -e . "$OUT_DIR/result.json" >/dev/null 2>&1; then
            outcome="$(jq -r '.outcome // "failed"' "$OUT_DIR/result.json")"
            note="$(jq -r '.note // ""' "$OUT_DIR/result.json")"
          fi
          case "$outcome" in shaped|blocked|split) ;; *) outcome=failed ;; esac
          if [ "$outcome" = "shaped" ] || [ "$outcome" = "split" ]; then
            if [ ! -s "$OUT_DIR/issue-body.md" ]; then
              outcome=failed
              note='The Composer reported success but wrote no issue-body.md.'
            fi
          fi
          if [ "$outcome" = "shaped" ] && \
             ! grep -qi 'ready for implementation' "$OUT_DIR/issue-body.md"; then
            outcome=failed
            note='The shaped body is missing the "ready for implementation" checkbox, so approval would be impossible.'
          fi
          if [ "$outcome" = "split" ]; then
            count="$(jq '.issues | length' "$OUT_DIR/result.json" 2>/dev/null || echo 0)"
            valid="$(jq '[.issues[]? | ((.title // "" | length) > 0) and ((.body // "" | length) > 0)] | all' \
              "$OUT_DIR/result.json" 2>/dev/null || echo false)"
            if [ "$count" -lt 2 ] || [ "$count" -gt 8 ] || [ "$valid" != "true" ]; then
              outcome=failed
              note="A split must propose 2-8 sub-issues, each with a title and body (got ${count})."
            fi
          fi
          {
            echo '**issue-driven-flow** — Composer is blocked on missing input.'
            echo
            echo "$note"
            echo
            echo "Edit the issue (or answer in a comment) with the missing information, then add the \`${TRIGGER_LABEL}\` label to retry shaping."
          } > "$OUT_DIR/blocked-comment.md"
          {
            echo '**issue-driven-flow** — the shape run failed.'
            echo
            echo "$note"
            echo
            echo "See the [run log](${RUN_URL}). Fix the cause if needed, then add the \`${TRIGGER_LABEL}\` label to retry."
          } > "$OUT_DIR/failed-comment.md"
          echo "outcome=${outcome}" >> "$GITHUB_OUTPUT"

      - name: Apply result — shaped
        if: steps.result.outputs.outcome == 'shaped'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/awaiting-approval
          body-file: ${{ env.OUT_DIR }}/issue-body.md
          comment: >-
            **issue-driven-flow** — Composer finished shaping this issue.
            Review the rewritten body and edit anything that misses your
            intent. When you agree with the plan, tick the
            "ready for implementation" checkbox and add the
            `${{ inputs.trigger_label }}` label to start implementation.
            Adding `${{ inputs.trigger_label }}` while the box is unchecked
            sends the issue back to the Composer instead.

      # Sub-issue creation is mechanical: the Composer only proposed the
      # titles and bodies in result.json.
      - name: Apply result — split (create sub-issues)
        id: split
        if: steps.result.outputs.outcome == 'split'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create "flow/awaiting-approval" --repo "$REPO" --color 1d76db \
            --description "issue-driven-flow: shaped, waiting for human approval (automation-managed)" \
            >/dev/null 2>&1 || true
          count="$(jq '.issues | length' "$OUT_DIR/result.json")"
          : > "$OUT_DIR/sub-list.md"
          for i in $(seq 0 $((count - 1))); do
            title="$(jq -r ".issues[$i].title" "$OUT_DIR/result.json")"
            jq -r ".issues[$i].body" "$OUT_DIR/result.json" > "$OUT_DIR/sub-body.md"
            number="$(gh api -X POST "repos/${REPO}/issues" \
              -f title="$title" -F body=@"$OUT_DIR/sub-body.md" \
              -f "labels[]=flow/awaiting-approval" --jq '.number')"
            echo "- [ ] #${number} ${title}" >> "$OUT_DIR/sub-list.md"
          done
          {
            cat "$OUT_DIR/issue-body.md"
            echo
            echo "## Sub-issues"
            echo
            cat "$OUT_DIR/sub-list.md"
          } > "$OUT_DIR/parent-body.md"

      - name: Apply result — split (update parent)
        if: steps.result.outputs.outcome == 'split'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/split
          body-file: ${{ env.OUT_DIR }}/parent-body.md
          comment: >-
            **issue-driven-flow** — this issue was too large for one PR, so the
            Composer split it into sub-issues (see the "Sub-issues" section).
            Each sub-issue is already shaped and awaiting approval: review
            it, tick its "ready for implementation" checkbox, and add the
            `${{ inputs.trigger_label }}` label on that sub-issue to
            implement it. This issue is now
            a tracking issue and will not be implemented directly.

      - name: Apply result — blocked
        if: steps.result.outputs.outcome == 'blocked'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/blocked-shape
          comment-file: ${{ env.OUT_DIR }}/blocked-comment.md

      - name: Apply result — failed
        if: steps.result.outputs.outcome == 'failed'
        uses: 4moda/issue-driven-flow/actions/update-issue@v2
        with:
          issue-number: ${{ env.ISSUE }}
          state: flow/blocked-shape
          comment-file: ${{ env.OUT_DIR }}/failed-comment.md

      - name: Recover from unexpected failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "flow/blocked-shape" --repo "$REPO" --color d93f0b \
            --description "issue-driven-flow: shaping blocked, needs human input (automation-managed)" \
            >/dev/null 2>&1 || true
          # clear whatever state the run started from, so at most one
          # flow/* label remains after recovery
          for label in flow%2Fshaping flow%2Fawaiting-approval; do
            gh api -X DELETE "repos/${REPO}/issues/${ISSUE}/labels/${label}" \
              >/dev/null 2>&1 || true
          done
          gh api -X POST "repos/${REPO}/issues/${ISSUE}/labels" \
            -f "labels[]=flow/blocked-shape" >/dev/null 2>&1 || true
          gh api -X POST "repos/${REPO}/issues/${ISSUE}/comments" \
            -f body="**issue-driven-flow** — the shape run failed unexpectedly. See the [run log](${RUN_URL}), then add the \`${TRIGGER_LABEL}\` label to retry." \
            >/dev/null 2>&1 || true
          encoded="$(jq -rn --arg l "$TRIGGER_LABEL" '$l | @uri')"
          gh api -X DELETE "repos/${REPO}/issues/${ISSUE}/labels/${encoded}" \
            >/dev/null 2>&1 || true
