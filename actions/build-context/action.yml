name: github-flow build-context
description: >-
  Collect everything a github-flow agent run needs into a context directory:
  issue payload, body and conversation, current flow/* state, ready-checkbox
  state, linked PR with its review feedback, a repository tree summary, and
  the agent contracts. Also places skills declared in this repository's
  apm.yml (see https://github.com/microsoft/apm) at Claude Code's personal
  skill directory (~/.claude/skills/github-flow/), so Claude Code's own
  Agent Skills detection picks it up. The target repository must already
  be checked out in the workspace.
inputs:
  issue-number:
    description: Issue number in the current repository
    required: true
  context-dir:
    description: Directory to write context files into (default $RUNNER_TEMP/gf-context)
    required: false
    default: ""
outputs:
  state:
    description: Current flow/* state label, or "none"
    value: ${{ steps.collect.outputs.state }}
  ready:
    description: '"true" when the ready-for-implementation checkbox is ticked'
    value: ${{ steps.collect.outputs.ready }}
  pr-number:
    description: Open PR whose head branch is flow/issue-<n>, empty if none
    value: ${{ steps.collect.outputs.pr-number }}
  branch:
    description: Working branch name for this issue
    value: ${{ steps.collect.outputs.branch }}
runs:
  using: composite
  steps:
    - id: collect
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        ISSUE: ${{ inputs.issue-number }}
        DIR: ${{ inputs.context-dir }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        gf="${ACTION_PATH}/../../scripts/gf.py"
        DIR="${DIR:-${RUNNER_TEMP}/gf-context}"
        mkdir -p "$DIR/contracts"

        gh api "repos/${REPO}/issues/${ISSUE}" > "$DIR/issue.json"
        jq -r '.body // ""' "$DIR/issue.json" > "$DIR/issue-body.md"
        gh api "repos/${REPO}/issues/${ISSUE}/comments" > "$DIR/issue-comments.json"

        state="$(python3 "$gf" state < "$DIR/issue.json")"
        ready="$(python3 "$gf" ready < "$DIR/issue.json")"
        branch="flow/issue-${ISSUE}"
        owner="${REPO%%/*}"
        pr="$(gh api "repos/${REPO}/pulls?state=open&head=${owner}:${branch}" \
          --jq '.[0].number // empty')"

        if [ -n "$pr" ]; then
          gh api "repos/${REPO}/pulls/${pr}" > "$DIR/pr.json"
          gh api "repos/${REPO}/pulls/${pr}/reviews" > "$DIR/pr-reviews.json"
          gh api "repos/${REPO}/pulls/${pr}/comments" > "$DIR/pr-review-comments.json"
          gh api "repos/${REPO}/issues/${pr}/comments" > "$DIR/pr-comments.json"
        fi

        if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          git ls-files > "$DIR/tree.txt"
          for f in README.md README.rst README.txt readme.md; do
            if [ -f "$f" ]; then
              head -c 8000 "$f" > "$DIR/readme-excerpt.md"
              break
            fi
          done
          # the repository's PR template, for the Crafter's PR summary
          # (GitHub only auto-applies it to web-UI PRs, not API-created ones)
          for f in .github/PULL_REQUEST_TEMPLATE.md .github/pull_request_template.md \
                   PULL_REQUEST_TEMPLATE.md pull_request_template.md \
                   docs/PULL_REQUEST_TEMPLATE.md docs/pull_request_template.md; do
            if [ -f "$f" ]; then
              cp "$f" "$DIR/pr-template.md"
              break
            fi
          done
        fi

        # Place skills declared in this repository's apm.yml (see
        # https://github.com/microsoft/apm) at Claude Code's *personal*
        # skill directory, ~/.claude/skills/ -- not the target
        # repository's working tree. Personal skills are a documented
        # Claude Code mechanism (alongside project-level .claude/skills/)
        # and $HOME here is never part of any git working tree, so there
        # is nothing to exclude and nothing that can leak into a Crafter
        # commit or PR diff -- a structural guarantee, not one we have to
        # remember to maintain. Deployment is still redirected to a
        # scratch dir first (--root) so apm's own bookkeeping
        # (apm_modules/, apm.lock.yaml, its own .gitignore) doesn't end
        # up anywhere either; only .claude/skills/ is copied out of it.
        apm_bin_dir="${RUNNER_TEMP}/apm-bin"
        if ! command -v apm >/dev/null 2>&1; then
          mkdir -p "$apm_bin_dir"
          curl -sSL https://aka.ms/apm-unix \
            | VERSION=v0.24.1 APM_INSTALL_DIR="$apm_bin_dir" sh >/dev/null
          export PATH="${apm_bin_dir}:${PATH}"
        fi

        apm_scratch="${RUNNER_TEMP}/apm-scratch"
        rm -rf "$apm_scratch"
        (cd "${ACTION_PATH}/../.." && apm install --target claude --root "$apm_scratch")

        if [ -d "${apm_scratch}/.claude/skills" ]; then
          mkdir -p "${HOME}/.claude"
          cp -r "${apm_scratch}/.claude/skills" "${HOME}/.claude/skills"
        fi

        cp "${ACTION_PATH}/../../skills/github-flow/references/"*.md "$DIR/contracts/"

        default_branch="$(gh api "repos/${REPO}" --jq '.default_branch')"
        jq -n \
          --arg number "$ISSUE" \
          --arg title "$(jq -r '.title // ""' "$DIR/issue.json")" \
          --arg state "$state" \
          --arg ready "$ready" \
          --arg branch "$branch" \
          --arg pr "${pr}" \
          --arg default_branch "$default_branch" \
          --arg repository "$REPO" \
          '{
            number: ($number | tonumber),
            title: $title,
            state: $state,
            ready: ($ready == "true"),
            branch: $branch,
            pr_number: (if $pr == "" then null else ($pr | tonumber) end),
            default_branch: $default_branch,
            repository: $repository
          }' > "$DIR/meta.json"

        {
          echo "state=${state}"
          echo "ready=${ready}"
          echo "pr-number=${pr}"
          echo "branch=${branch}"
        } >> "$GITHUB_OUTPUT"
