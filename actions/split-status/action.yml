name: issue-driven-flow split-status
description: >-
  Resolve a just-closed issue's flow/split parent (if any), via the hidden
  marker shape.yml writes into each sub-issue body at split-creation time,
  and decide whether every sub-issue listed in that parent's "## Sub-issues"
  checklist is now closed. Wraps scripts/gf.py so sync-pr.yml can react to a
  completed split mechanically.
inputs:
  issue-number:
    description: Number of the issue that just closed
    required: true
outputs:
  parent-number:
    description: >-
      The flow/split parent's issue number, or empty when the closed issue
      was not created by a split
    value: ${{ steps.status.outputs.parent-number }}
  complete:
    description: >-
      "true" when every sub-issue listed in the parent's checklist is
      closed, else "false" (including when there is no parent)
    value: ${{ steps.status.outputs.complete }}
runs:
  using: composite
  steps:
    - id: status
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        ISSUE: ${{ inputs.issue-number }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        gf="${ACTION_PATH}/../../scripts/gf.py"

        issue_json="$(gh api "repos/${REPO}/issues/${ISSUE}")"
        parent_number="$(python3 "$gf" split-parent <<<"$issue_json")"
        echo "parent-number=${parent_number}" >> "$GITHUB_OUTPUT"
        if [ -z "$parent_number" ]; then
          echo "complete=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        parent_json="$(gh api "repos/${REPO}/issues/${parent_number}")"
        siblings="[]"
        while IFS= read -r n; do
          [ -n "$n" ] || continue
          sibling_json="$(gh api "repos/${REPO}/issues/${n}")"
          siblings="$(jq --argjson s "$sibling_json" '. + [$s]' <<<"$siblings")"
        done < <(python3 "$gf" sub-issue-numbers <<<"$parent_json")

        complete="$(jq -n --argjson parent "$parent_json" --argjson siblings "$siblings" \
          '{parent: $parent, siblings: $siblings}' | python3 "$gf" split-complete)"
        echo "complete=${complete}" >> "$GITHUB_OUTPUT"
